name: CD Pipeline

on:
  push:
    branches: [ main, dev ]
  workflow_dispatch:

jobs:
  deploy-images:
    name: Build and Push Docker Images (CD)
    runs-on: ubuntu-latest

    env:
      REGISTRY: docker.io
      BACKEND_IMAGE: ${{ secrets.DOCKER_USERNAME }}/gogir-labs-backend
      FRONTEND_IMAGE: ${{ secrets.DOCKER_USERNAME }}/gogir-labs-frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./gogir-labs-be
          file: ./gogir-labs-be/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.BACKEND_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.BACKEND_IMAGE }}:buildcache,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./gogir-labs-fe
          file: ./gogir-labs-fe/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.FRONTEND_IMAGE }}:buildcache,ignore-error=true
          cache-to: type=registry,ref=${{ env.FRONTEND_IMAGE }}:buildcache,mode=max

