name: Backend Cloudflare Setup

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# GitHub is moving JS-based actions to Node 24; opt in early to avoid deprecation noise.
# https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  PYTHON_VERSION: '3.11'
  DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/gogir-labs-backend

jobs:
  validate-backend-for-cloudflare:
    name: Validate Backend for Cloudflare
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install backend dependencies
        working-directory: ./gogir-labs-be
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Django deploy checks
        working-directory: ./gogir-labs-be
        env:
          DEBUG: 'False'
          SECRET_KEY: 'test-secret-key-for-cloudflare-check-min-50-chars-long-random'
          DATABASE_URL: sqlite:///db.sqlite3
        run: |
          python manage.py check --deploy

      - name: Run backend tests (SQLite)
        working-directory: ./gogir-labs-be
        env:
          DEBUG: 'False'
          SECRET_KEY: 'test-secret-key-for-cloudflare-check-min-50-chars-long-random'
          DATABASE_URL: sqlite:///db.sqlite3
          SECURE_SSL_REDIRECT: 'False'
        run: |
          pytest -q

      - name: Run production config sanity check for Cloudflare
        working-directory: .
        env:
          DEBUG: 'False'
          CORS_ALLOW_ALL_ORIGINS: 'False'
          # Same dummy key pattern as Django check/tests above (not a real production secret).
          SECRET_KEY: 'test-secret-key-for-cloudflare-check-min-50-chars-long-random'
          # Prefer repo secrets in production; CI uses safe placeholders when unset.
          ALLOWED_HOSTS: ${{ secrets.API_ALLOWED_HOSTS != '' && secrets.API_ALLOWED_HOSTS || 'localhost,127.0.0.1,api.ci.placeholder' }}
          CORS_ALLOWED_ORIGINS: ${{ secrets.CLOUDFLARE_PAGES_URL != '' && secrets.CLOUDFLARE_PAGES_URL || 'https://ci-placeholder.pages.dev' }}
          CSRF_TRUSTED_ORIGINS: ${{ secrets.CLOUDFLARE_PAGES_URL != '' && secrets.CLOUDFLARE_PAGES_URL || 'https://ci-placeholder.pages.dev' }}
          FRONTEND_URL: ${{ secrets.CLOUDFLARE_PAGES_URL != '' && secrets.CLOUDFLARE_PAGES_URL || 'https://ci-placeholder.pages.dev' }}
        run: |
          chmod +x scripts/check-prod-config.sh
          ./scripts/check-prod-config.sh

  build-and-push-backend-image:
    name: Build and Push Backend Image (Cloudflare Ready)
    runs-on: ubuntu-latest
    needs: [validate-backend-for-cloudflare]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image (Cloudflare)
        uses: docker/build-push-action@v5
        with:
          context: ./gogir-labs-be
          file: ./gogir-labs-be/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:cloudflare
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}-cloudflare
          cache-from: type=registry,ref=${{ env.DOCKER_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.DOCKER_IMAGE }}:buildcache,mode=max

