name: Backend Cloudflare Setup

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'
  DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/gogir-labs-backend

jobs:
  validate-backend-for-cloudflare:
    name: Validate Backend for Cloudflare
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install backend dependencies
        working-directory: ./gogir-labs-be
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Django deploy checks
        working-directory: ./gogir-labs-be
        env:
          DEBUG: 'False'
          SECRET_KEY: test-secret-key-for-cloudflare-check
          DATABASE_URL: sqlite:///db.sqlite3
        run: |
          python manage.py check --deploy

      - name: Run backend tests (SQLite)
        working-directory: ./gogir-labs-be
        env:
          DEBUG: 'False'
          SECRET_KEY: test-secret-key-for-cloudflare-check
          DATABASE_URL: sqlite:///db.sqlite3
        run: |
          pytest -q

      - name: Run production config sanity check for Cloudflare
        working-directory: .
        env:
          DEBUG: 'False'
          CORS_ALLOW_ALL_ORIGINS: 'False'
          # Expected to be set as GitHub secrets
          ALLOWED_HOSTS: ${{ secrets.API_ALLOWED_HOSTS }}
          CORS_ALLOWED_ORIGINS: ${{ secrets.CLOUDFLARE_PAGES_URL }}
          CSRF_TRUSTED_ORIGINS: ${{ secrets.CLOUDFLARE_PAGES_URL }}
          FRONTEND_URL: ${{ secrets.CLOUDFLARE_PAGES_URL }}
        run: |
          chmod +x scripts/check-prod-config.sh
          ./scripts/check-prod-config.sh

  build-and-push-backend-image:
    name: Build and Push Backend Image (Cloudflare Ready)
    runs-on: ubuntu-latest
    needs: [validate-backend-for-cloudflare]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image (Cloudflare)
        uses: docker/build-push-action@v5
        with:
          context: ./gogir-labs-be
          file: ./gogir-labs-be/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:cloudflare
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}-cloudflare
          cache-from: type=registry,ref=${{ env.DOCKER_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.DOCKER_IMAGE }}:buildcache,mode=max

